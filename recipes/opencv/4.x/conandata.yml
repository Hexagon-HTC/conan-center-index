    - patch_file: "patches/4.10.0-0002-fix-visibility.patch"
      patch_description: "Changed any cast to use not unique type_info to make sure tested type matches the type stored in any"
      patch_type: "HXGN-CV"
    - patch_file: "patches/4.12.0-0003-fix-ios-avfoundation-async.patch"
      patch_description: "Fix AVFoundation backend on iOS Simulator: inverted error condition and async constructor returning before callback fires (https://github.com/opencv/opencv/issues/28666)"
      patch_type: "HXGN-CV"
    - patch_file: "patches/4.12.0-0004-pin-ippicv-cv-compare.patch"
      patch_description: "Pin x86_64 IPPICV to 2021.12.0 (as in 4.11.0) to avoid the ~4x cv::compare performance regression introduced by the 2022.1.0 IPPICV update (https://github.com/opencv/opencv/issues/28251)"
      patch_type: "conan"
